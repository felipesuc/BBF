<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel BBF — Empresas SJ</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0A3D7A; --navy-dark:#062D5C; --navy-mid:#1356A0;
  --yellow:#FFC72C; --yellow-light:#FFF3C4;
  --white:#FFFFFF; --bg:#F4F6FA; --border:#DDE3EE;
  --text:#1A2742; --muted:#6B7A99;
  --green:#16A34A; --green-bg:#DCFCE7;
  --red:#DC2626; --red-bg:#FEE2E2;
  --orange:#D97706; --orange-bg:#FEF3C7;
  --blue:#2563EB; --blue-bg:#DBEAFE;
  --purple:#7C3AED; --purple-bg:#F5F3FF;
  --gray:#9CA3AF; --gray-bg:#F3F4F6;
  --r:12px; --r-sm:8px;
  --sh:0 1px 4px rgba(10,61,122,.10);
  --sh-md:0 4px 20px rgba(10,61,122,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ═══ LOGIN ═══ */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:20px}
.login-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden;width:100%;max-width:400px}
.login-head{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:26px 28px 22px;display:flex;align-items:center;gap:12px}
.login-logo{width:38px;height:38px;background:var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:16px;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.login-title{font-size:16px;font-weight:700;color:#fff}
.login-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px}
.login-body{padding:28px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.fi{height:46px;padding:0 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:'IBM Plex Sans',sans-serif;color:var(--text);background:#fff;outline:none;width:100%;transition:border-color .2s, box-shadow .2s}
.fi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,61,122,.10)}
.btn-primary{width:100%;height:48px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover:not(:disabled){background:var(--navy-dark)}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.alert-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2);padding:10px 14px;border-radius:var(--r-sm);font-size:12px;margin-top:12px;display:none}
.alert-err.show{display:block}

/* ═══ APP SHELL ═══ */
#screen-app{display:none;min-height:100vh;flex-direction:column}
#screen-app.active{display:flex}
.hdr{background:var(--navy);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.22)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;background:var(--yellow);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:14px;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.hdr-title{font-size:14px;font-weight:700;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.55)}
.hdr-right{display:flex;align-items:center;gap:14px}
.hdr-email{font-size:11px;color:rgba(255,255,255,.7);font-family:'IBM Plex Mono',monospace}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.18)}

.main{flex:1;max-width:1360px;margin:0 auto;width:100%;padding:20px 24px 60px}

/* ═══ FILTERS ═══ */
.filters{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);padding:16px 18px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.filter-item{display:flex;flex-direction:column;gap:5px;min-width:150px}
.filter-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.filter-sel{position:relative}
.filter-btn{height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:#fff;font-size:12.5px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:170px;font-family:'IBM Plex Sans',sans-serif}
.filter-btn:hover{border-color:var(--navy-mid)}
.filter-count{background:var(--navy);color:#fff;font-size:9.5px;font-weight:700;border-radius:10px;padding:1px 7px;font-family:'IBM Plex Mono',monospace}
.filter-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--sh-md);z-index:50;min-width:220px;max-height:280px;overflow-y:auto;padding:8px}
.filter-menu.open{display:block}
.filter-opt{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12.5px}
.filter-opt:hover{background:var(--bg)}
.filter-opt input{cursor:pointer}
.filter-text{height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12.5px;font-family:'IBM Plex Sans',sans-serif;outline:none;min-width:170px}
.filter-text:focus{border-color:var(--navy)}
.btn-clear{height:38px;padding:0 14px;background:none;border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-clear:hover{border-color:var(--red);color:var(--red)}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:2px solid var(--border)}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ═══ KPI CARDS ═══ */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);padding:16px 18px}
.kpi-num{font-size:26px;font-weight:700;color:var(--navy);font-family:'IBM Plex Mono',monospace;line-height:1.1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

/* ═══ DASH GRID ═══ */
.dash-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card-title small{font-size:10.5px;font-weight:500;color:var(--muted)}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{width:150px;font-size:11.5px;color:var(--text);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:var(--gray-bg);border-radius:5px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;transition:width .4s ease}
.bar-val{width:52px;text-align:right;font-size:11px;font-weight:700;color:var(--text);font-family:'IBM Plex Mono',monospace;flex-shrink:0}

.tag-cloud{display:flex;flex-wrap:wrap;gap:8px}
.tag-chip{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11.5px}
.tag-chip b{color:var(--navy);font-family:'IBM Plex Mono',monospace;font-size:10.5px}

.empty-note{font-size:12px;color:var(--muted);text-align:center;padding:24px 0}

/* ═══ ADERÊNCIA ═══ */
.ader-emp-list{display:flex;flex-direction:column}
.ader-emp-row{border-top:1px solid var(--border)}
.ader-emp-row:first-child{border-top:none}
.ader-emp-head{display:flex;align-items:center;gap:14px;padding:10px 2px}
.ader-emp-name{width:170px;flex-shrink:0;font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.ader-caret{font-size:10px;color:var(--muted);width:10px;display:inline-block}
.ader-emp-bar{flex:1}
.ader-emp-count{width:56px;text-align:right;font-size:11.5px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.ader-emp-body{display:none;font-size:11.5px;color:var(--red);line-height:1.7;padding:2px 2px 12px 32px}
.ader-emp-body.open{display:block}
.ader-emp-body-lbl{font-weight:700;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.4px;margin-right:4px}

/* ═══ UGB DETAIL ═══ */
.ugb-select-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ugb-select-row select{height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:'IBM Plex Sans',sans-serif;min-width:260px}

.quote-list{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto}
.quote-item{background:var(--bg);border-left:3px solid var(--navy);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 14px}
.quote-meta{font-size:10.5px;color:var(--muted);margin-bottom:4px;display:flex;gap:8px;font-family:'IBM Plex Mono',monospace}
.quote-txt{font-size:12.5px;color:var(--text);line-height:1.5}

/* ═══ DATASET TABLE ═══ */
.table-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.table-count{font-size:12.5px;color:var(--muted)}
.btn-export{height:36px;padding:0 14px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer}
.btn-export:hover{background:var(--navy-dark)}
.tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--bg);color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.4px;padding:10px 12px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr.row-main:hover{background:var(--bg)}
.lvl-pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10.5px;font-weight:700}
.btn-expand{background:none;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--navy);cursor:pointer;padding:3px 9px}
.row-detail{display:none;background:var(--bg)}
.row-detail.open{display:table-row}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:6px 4px}
.detail-block b{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px;margin-bottom:4px}
.detail-block p{font-size:12px;color:var(--text);line-height:1.55}
.detail-block ul{padding-left:16px;font-size:12px}

.loading-wrap{display:flex;align-items:center;justify-content:center;padding:80px 0;color:var(--muted);font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .dash-grid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="screen-login">
  <div class="login-card">
    <div class="login-head">
      <div>
        <div class="login-title">Painel BBF — Acesso restrito</div>
        <div class="login-sub">Básico Bem Feito · Empresas SJ</div>
      </div>
    </div>
    <div class="login-body">
      <div class="fg">
        <label class="fl">E-mail</label>
        <input class="fi" id="login-email" type="email" placeholder="seuemail@empresa.com.br" autocomplete="username">
      </div>
      <div class="fg">
        <label class="fl">Senha</label>
        <input class="fi" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
      <div class="alert-err" id="login-err"></div>
    </div>
  </div>
</div>

<div id="screen-app">
  <div class="hdr">
    <div class="hdr-brand">
      <div>
        <div class="hdr-title">Painel BBF</div>
        <div class="hdr-sub">Básico Bem Feito · 1º Semestre 2026</div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="hdr-email" id="hdr-email"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="filters" id="filters"></div>

    <div class="tabs">
      <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</div>
      <div class="tab" data-tab="dataset" onclick="switchTab('dataset')">Dados</div>
      <div class="tab" data-tab="sessoes" onclick="switchTab('sessoes')">Sessões de resposta</div>
    </div>

    <div id="loading" class="loading-wrap"><div class="spin"></div> Carregando respostas…</div>

    <div id="tab-dashboard" class="tab-panel active"></div>
    <div id="tab-dataset" class="tab-panel"></div>
    <div id="tab-sessoes" class="tab-panel"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://zwcclbtemxtefdtuylhs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Y2NsYnRlbXh0ZWZkdHV5bGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MjY2NzYsImV4cCI6MjA5OTEwMjY3Nn0.aKAaTcQwg3Yta-DPm7yd4m61xFaBshjZlZBhNEvfN3E';
const SESSION_KEY = 'bbf_admin_session';

const EMPRESA_NOMES = { sj:'Empresas SJ', readi:'READI', adv:'SJ Advogados', vg:'Verdegreen', iua:'iu-á Hotel', cadis:'CADIS 3' };
const NIVEL_INFO = {
  1:{label:'Abaixo do Básico', color:'#DC2626', bg:'#FEE2E2'},
  2:{label:'Em Construção',    color:'#D97706', bg:'#FEF3C7'},
  3:{label:'Básico Realizado', color:'#2563EB', bg:'#DBEAFE'},
  4:{label:'Básico Consolidado', color:'#7C3AED', bg:'#F5F3FF'},
  5:{label:'Além do Básico',   color:'#16A34A', bg:'#DCFCE7'},
};
const NIVEL_ANCHORS = {
  1:'Processos essenciais com falhas recorrentes; não há padrão de execução definido; erros impactam clientes e outras UGBs com frequência. A área apaga incêndio, não entrega.',
  2:'O básico existe, mas a execução é instável. Depende de quem está de plantão ou do contexto do dia. Ainda há lacunas visíveis e o resultado varia entre pessoas ou períodos.',
  3:'Os processos essenciais funcionam com regularidade. A equipe sabe o que precisa fazer e entrega na maior parte das vezes, com exceções pontuais gerenciáveis.',
  4:'Execução consistente e previsível. Exceções são tratadas rapidamente. A equipe opera com autonomia e alinhamento. Qualquer pessoa substitui qualquer pessoa sem perda de padrão.',
  5:'O básico está tão consolidado que a área opera com autonomia total e consistência independente de quem está presente. Os padrões são conhecidos, respeitados e executados sem necessidade de controle externo.',
};

// Universo oficial de UGBs por empresa (extraído dos indicadores da pesquisa) — usado para medir aderência
const UGB_UNIVERSE = {
  "sj": ["Apoio a clientes","Arquivo","Atendimento a Inquilino - Contratos","Atendimento a Inquilino - Imóveis","Concessionárias","Condomínio","Crédito e Contrato","Desocupação","Embalagem","Estoque","Gerência Administrativa","Gerência de Atendimento","Gerência de Contas","IMDEX","IPTU","Locação SJ Morar","Locação SJ Negócios","Novos Clientes","Relacionamento","Seguro Incêndio","Vistoria"],
  "readi": ["Cuido de Clientes","Cuido de Docs","Cuido de Finanças","Cuido de Licenças","Cuido de Precificação","Cuido de Produtos","Cuido de Regularização","Cuido de Tech"],
  "adv": ["Administrativo","Assessoria Jurídica","Contencioso","Controladoria","Negociações"],
  "vg": ["Contabilidade","Controladoria - VG","Coord. Receita e Distribuição","Cozinha","Departamento de Pessoal","Financeiro","Gente e Gestão","Gerência de Vendas","Governança","Grupos e Eventos","Manutenção","Marketing","Recepção","Reservas","Restaurante","Suprimentos","TI"],
  "iua": ["Almoxarifado","Contabilidade","Controladoria - IU-Á","Cozinha","Eventos","Financeiro","Gente e Gestão","Gerência","Governança","Manutenção","Marketing","Recepção","Reservas","Restaurante","Setor Pessoal","T.I. IU-Á"],
  "cadis": ["Contabilidade","Financeiro","Gente e Gestão","Gepa","Marketing","Secretária da Direção","Setor Pessoal","Tecnologia e Inovação"]
};

let session = null;      // {access_token, refresh_token, expires_at, email}
let allRows = [];
let filtered = [];
let currentTab = 'dashboard';
let expandedRows = new Set();

const filterState = { empresa:new Set(), ugb:new Set(), nivel:new Set(), pessoa:'' };

// ══════════════════════════════════════════
// ADERÊNCIA
// ══════════════════════════════════════════
function computeAdherence(){
  const empresasEscopo = filterState.empresa.size ? [...filterState.empresa] : Object.keys(UGB_UNIVERSE);
  const respondidos = new Set(
    allRows
      .filter(r => empresasEscopo.includes(r.empresa))
      .map(r => `${r.empresa}||${r.ugb}`)
  );
  const porEmpresa = empresasEscopo.map(emp => {
    const universo = (UGB_UNIVERSE[emp]||[]);
    const universoEscopo = filterState.ugb.size ? universo.filter(u=>filterState.ugb.has(u)) : universo;
    const pendentes = universoEscopo.filter(u => !respondidos.has(`${emp}||${u}`));
    const respondidasCount = universoEscopo.length - pendentes.length;
    return { empresa: emp, total: universoEscopo.length, respondidas: respondidasCount, pendentes };
  });
  const totalUniverso = porEmpresa.reduce((s,e)=>s+e.total,0);
  const totalRespondidas = porEmpresa.reduce((s,e)=>s+e.respondidas,0);
  return { totalUniverso, totalRespondidas, porEmpresa };
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
function saveSession(s){ session = s; localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function loadSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function clearSession(){ session = null; localStorage.removeItem(SESSION_KEY); }

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  errEl.classList.remove('show');
  if(!email || !pass){
    errEl.textContent = 'Preencha e-mail e senha.';
    errEl.classList.add('show');
    return;
  }
  btn.disabled = true; btn.textContent = 'Entrando…';
  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if(!res.ok){
      errEl.textContent = 'E-mail ou senha inválidos.';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Entrar';
      return;
    }
    saveSession({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: Date.now() + (data.expires_in*1000),
      email
    });
    enterApp();
  }catch(e){
    errEl.textContent = 'Erro de conexão. Tente novamente.';
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function refreshSession(){
  if(!session?.refresh_token) return false;
  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY },
      body: JSON.stringify({ refresh_token: session.refresh_token })
    });
    if(!res.ok) return false;
    const data = await res.json();
    saveSession({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: Date.now() + (data.expires_in*1000),
      email: session.email
    });
    return true;
  }catch(e){ return false; }
}

function doLogout(){
  clearSession();
  location.reload();
}

// ══════════════════════════════════════════
// DATA FETCH
// ══════════════════════════════════════════
async function fetchRows(){
  if(session.expires_at - Date.now() < 60000){
    const ok = await refreshSession();
    if(!ok){ clearSession(); location.reload(); return; }
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/bbf_respostas?select=*&order=created_at.desc`, {
    headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${session.access_token}` }
  });
  if(res.status===401){
    const ok = await refreshSession();
    if(ok) return fetchRows();
    clearSession(); location.reload(); return;
  }
  if(!res.ok){
    document.getElementById('loading').innerHTML = 'Não foi possível carregar as respostas. Recarregue a página.';
    return;
  }
  allRows = await res.json();
  document.getElementById('loading').style.display = 'none';
  buildFilters();
  applyFilters();
}

  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('hdr-email').textContent = session.email;
  fetchRows();
}

        <button class="filter-btn" onclick="toggleMenu('menu-nivel')">
          <span id="lbl-nivel">Todos</span>
          <span class="filter-count" id="cnt-nivel" style="display:none"></span>
        </button>
        <div class="filter-menu" id="menu-nivel">
          ${[1,2,3,4,5].map(n=>`<label class="filter-opt"><input type="checkbox" value="${n}" onchange="toggleFilter('nivel','${n}',this.checked)"> ${n} · ${NIVEL_INFO[n].label}</label>`).join('')}
        </div>
      </div>

  `;

function toggleMenu(id){
  const menu = document.getElementById(id);
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.filter-menu.open').forEach(m=>m.classList.remove('open'));
  if(!wasOpen) menu.classList.add('open');
}

function toggleFilter(kind, value, checked){
  const set = filterState[kind];
  if(checked) set.add(value); else set.delete(value);
  updateFilterLabel(kind);
  applyFilters();
}

function updateFilterLabel(kind){
  const set = filterState[kind];
  const lblEl = document.getElementById('lbl-'+kind);
  const cntEl = document.getElementById('cnt-'+kind);
  if(set.size===0){ lblEl.textContent = kind==='nivel'?'Todos':'Todas'; cntEl.style.display='none'; }
  else{ lblEl.textContent = 'Selecionado(s)'; cntEl.style.display='inline-block'; cntEl.textContent = set.size; }
}

function setPessoa(val){ filterState.pessoa = val.trim().toLowerCase(); applyFilters(); }

function clearFilters(){
  filterState.empresa.clear(); filterState.ugb.clear(); filterState.nivel.clear(); filterState.pessoa='';
  document.querySelectorAll('.filter-menu input[type=checkbox]').forEach(c=>c.checked=false);
  document.getElementById('filter-pessoa').value='';
  ['empresa','ugb','nivel'].forEach(updateFilterLabel);
  applyFilters();
}

function applyFilters(){
  filtered = allRows.filter(r=>{
    if(filterState.empresa.size && !filterState.empresa.has(r.empresa)) return false;
    if(filterState.ugb.size && !filterState.ugb.has(r.ugb)) return false;
    if(filterState.nivel.size && !filterState.nivel.has(String(r.nivel_entrega))) return false;
    if(filterState.pessoa && !(r.nome||'').toLowerCase().includes(filterState.pessoa)) return false;
    return true;
  });
  renderCurrentTab();
}

function toArrayField(v){
  if(Array.isArray(v)) return v;
  if(typeof v === 'string'){
    try{ const p = JSON.parse(v); return Array.isArray(p) ? p : (v?[v]:[]); }
    catch(e){ return v ? [v] : []; }
  }
  return [];
}

function freqCount(list){
  const m = new Map();
  list.forEach(v=>{ if(!v) return; m.set(v, (m.get(v)||0)+1); });
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}

function barChart(rows, colorMap, opts={}){
  if(!rows.length) return `<div class="empty-note">Sem dados para os filtros atuais.</div>`;
  const max = Math.max(...rows.map(r=>r[1]));
  return rows.slice(0, opts.limit||8).map(([label,val])=>{
    const pct = max? (val/max*100) : 0;
    const color = colorMap ? (colorMap[label]||'var(--navy-mid)') : 'var(--navy-mid)';
    return `<div class="bar-row">
      <div class="bar-lbl" title="${label}">${opts.labelFmt ? opts.labelFmt(label) : label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-val">${val}</div>
    </div>`;
  }).join('');
}

function renderAderenciaBlock(ader, aderPct){
  const barColor = aderPct>=80?'var(--green)':aderPct>=50?'var(--orange)':'var(--red)';

  // ordena empresas pela aderência (mais crítica primeiro)
  const ordenado = [...ader.porEmpresa].sort((a,b)=>{
    const pctA = a.total? a.respondidas/a.total : 1;
    const pctB = b.total? b.respondidas/b.total : 1;
    return pctA - pctB;
  });

  const empresaRows = ordenado.map((e,i)=>{
    const pct = e.total? Math.round(e.respondidas/e.total*100) : 100;
    const cor = pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)';
    const temPendentes = e.pendentes.length>0;
    const rowId = `ader-emp-${e.empresa}`;
    return `
    <div class="ader-emp-row">
      <div class="ader-emp-head" ${temPendentes?`onclick="toggleAderEmp('${rowId}')"`:''} style="${temPendentes?'cursor:pointer':''}">
        <div class="ader-emp-name">
          ${temPendentes?`<span class="ader-caret" id="${rowId}-caret">▸</span>`:'<span class="ader-caret" style="visibility:hidden">▸</span>'}
          ${EMPRESA_NOMES[e.empresa]||e.empresa}
        </div>
        <div class="ader-emp-bar"><div class="bar-track" style="height:10px"><div class="bar-fill" style="width:${pct}%;background:${cor}"></div></div></div>
        <div class="ader-emp-count" style="color:${cor}">${e.respondidas}/${e.total}</div>
      </div>
      ${temPendentes ? `
      <div class="ader-emp-body" id="${rowId}">
        <span class="ader-emp-body-lbl">Pendentes:</span> ${e.pendentes.join(', ')}
      </div>` : `<div class="ader-emp-body open" style="color:var(--green);font-size:11.5px">Todas as UGBs já responderam 🎉</div>`}
    </div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px">
      <div style="font-size:32px;font-weight:700;color:${barColor};font-family:'IBM Plex Mono',monospace">${aderPct}%</div>
      <div style="flex:1">
        <div class="bar-track" style="height:14px">
          <div class="bar-fill" style="width:${aderPct}%;background:${barColor}"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${ader.totalRespondidas} de ${ader.totalUniverso} UGBs (considerando os filtros de empresa/UGB atuais) já enviaram resposta</div>
      </div>
    </div>
    <div class="ader-emp-list">${empresaRows}</div>
  `;
}

function fmtDate(iso){

  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function toggleRow(id){
  if(expandedRows.has(id)) expandedRows.delete(id); else expandedRows.add(id);
  renderDataset();

function exportCSV(){
  const cols = ['created_at','nome','funcao','empresa','ugb','nivel_entrega','nivel_label','definicao_bbf','justificativa','analise_kpis','dimensoes_medidas','dimensoes_lacunas'];
  const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const lines = [cols.join(',')];
  filtered.forEach(r=>{
    lines.push(cols.map(c=>{
      let v = r[c];
      if(c==='dimensoes_medidas' || c==='dimensoes_lacunas') v = toArrayField(v).join(' | ');
      else if(Array.isArray(v)) v = v.join(' | ');
      return esc(v);
    }).join(','));
  });
  const blob = new Blob(['\ufeff'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bbf_respostas_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function renderSessoes(){

  host.innerHTML = `
    <div class="table-toolbar">
      <div class="table-count">${filtered.length} sessão(ões) de resposta encontrada(s)</div>
    </div>
    <div id="sessoes-list" style="display:flex;flex-direction:column;gap:14px"></div>
  `;
  const list = document.getElementById('sessoes-list');
  if(!filtered.length){
    list.innerHTML = `<div class="card"><div class="empty-note">Nenhuma sessão de resposta para os filtros selecionados.</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(r=>{
    const info = NIVEL_INFO[r.nivel_entrega]||{label:'—',color:'#666',bg:'#eee'};
    const medidas = toArrayField(r.dimensoes_medidas);
    const lacunas = toArrayField(r.dimensoes_lacunas);
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--text)">${r.nome||'—'} <span style="font-weight:500;color:var(--muted);font-size:12px">· ${r.funcao||'—'}</span></div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${EMPRESA_NOMES[r.empresa]||r.empresa} · ${r.ugb||'—'} · ${fmtDate(r.created_at)}</div>
        </div>
        <span class="lvl-pill" style="color:${info.color};background:${info.bg}">${r.nivel_entrega||'—'} · ${info.label}</span>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">P: Como esta UGB define "Básico Bem Feito"?</div>
          <div style="font-size:12.5px;color:var(--text);line-height:1.55">${r.definicao_bbf||'—'}</div>
        </div>
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">P: Quais dimensões já são medidas?</div>
          <ul style="padding-left:16px;font-size:12.5px;color:var(--text)">${medidas.map(d=>`<li>${d}</li>`).join('')||'<li>—</li>'}</ul>
        </div>
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">P: Quais lacunas ainda existem?</div>
          <ul style="padding-left:16px;font-size:12.5px;color:var(--text)">${lacunas.map(d=>`<li>${d}</li>`).join('')||'<li>—</li>'}</ul>
        </div>
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">P: Nível de entrega selecionado</div>
          <div style="font-size:12.5px;color:var(--text);line-height:1.55"><b style="color:${info.color}">${r.nivel_entrega} · ${info.label}</b> — ${NIVEL_ANCHORS[r.nivel_entrega]||''}</div>
        </div>
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">P: Justificativa do nível escolhido</div>
          <div style="font-size:12.5px;color:var(--text);line-height:1.55">${r.justificativa||'—'}</div>
        </div>
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">P: Análise crítica dos indicadores</div>
          <div style="font-size:12.5px;color:var(--text);line-height:1.55">${r.analise_kpis||'—'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
